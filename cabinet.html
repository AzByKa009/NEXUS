<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('nexus-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f8fc;--s1:#ffffff;--s2:#e8f5fb;--b1:#d0e8f4;--b2:#bde2f3;
  --t1:#000000;--t2:#333333;--t3:#666666;
  --font:'Inter',-apple-system,sans-serif;
}
[data-theme="dark"]{
  --bg:#0a1520;--s1:#0f1e2e;--s2:#14253a;--b1:#1e3352;--b2:#24406a;
  --t1:#e8f4fc;--t2:#a8c8e0;--t3:#6a9ab8;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(240,248,252,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
[data-theme="dark"] .nav{background:rgba(10,21,32,.92)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;letter-spacing:-.03em;color:var(--t1)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-back{font-size:13px;color:var(--t3);font-weight:500;transition:color .2s;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--t1)}
.nav-signout{background:none;border:none;font-size:13px;color:var(--t3);cursor:pointer;padding:0;transition:color .2s;font-family:var(--font)}
.nav-signout:hover{color:var(--t1)}

/* THEME TOGGLE */
.theme-toggle{width:36px;height:36px;border:1px solid var(--b1);border-radius:8px;background:var(--s2);color:var(--t2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--b2);color:var(--t1)}
.theme-toggle .icon-sun{display:none}
.theme-toggle .icon-moon{display:block}
[data-theme="dark"] .theme-toggle .icon-sun{display:block}
[data-theme="dark"] .theme-toggle .icon-moon{display:none}

/* CONTENT */
.wrap{max-width:720px;margin:0 auto;padding:100px 24px 80px}

/* PROFILE HEADER */
.profile-header{display:flex;align-items:center;gap:24px;margin-bottom:40px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--s2);border:2px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:var(--t1);flex-shrink:0;letter-spacing:-.02em}
.profile-name{font-size:26px;font-weight:800;letter-spacing:-.04em;color:var(--t1)}
.profile-sub{font-size:13px;color:var(--t3);margin-top:4px}

/* CARDS */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
.card{background:var(--s1);border:1.5px solid var(--b1);border-radius:12px;padding:24px}
.card-label{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:15px;font-weight:600;color:var(--t1);word-break:break-all}
.card-value.mono{font-family:monospace;font-size:16px;letter-spacing:.04em}

/* REFERRAL */
.ref-card{background:var(--s1);border:1.5px solid var(--b1);border-radius:12px;padding:24px;margin-bottom:24px}
.ref-label{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.ref-row{display:flex;align-items:center;gap:12px}
.ref-code{font-family:monospace;font-size:20px;font-weight:800;letter-spacing:.08em;color:var(--t1);flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--b1);border-radius:8px}
.ref-copy{padding:10px 18px;background:var(--t1);border:none;border-radius:8px;color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap;font-family:var(--font)}
.ref-copy:hover{opacity:.85}
.ref-hint{font-size:12px;color:var(--t3);margin-top:10px}

/* ACTIONS */
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--t1);border:none;border-radius:8px;color:var(--bg);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:var(--font)}
.btn-primary:hover{opacity:.85}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:transparent;border:1px solid var(--b1);border-radius:8px;color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--font)}
.btn-secondary:hover{border-color:var(--t1);color:var(--t1)}

/* LOADING */
.loading{text-align:center;padding:80px 24px;color:var(--t3);font-size:14px}

/* SUBSCRIPTION BADGE */
.sub-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.sub-free{background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.sub-active{background:rgba(34,197,94,.12);color:#16a34a;border:1px solid rgba(34,197,94,.2)}

/* FOOTER */
.footer{padding:32px 24px;border-top:1px solid var(--b1);background:var(--s1)}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-size:13px;font-weight:800;letter-spacing:-.03em;color:var(--t1)}
.footer-copy{font-size:12px;color:var(--t3)}
.footer-inn{font-size:11px;color:var(--t3);opacity:.7}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <clipPath id="nc1"><circle cx="100" cy="100" r="88"/></clipPath>
        <circle cx="100" cy="100" r="88" fill="none" stroke="currentColor" stroke-width="7"/>
        <g clip-path="url(#nc1)">
          <path d="M16 54 Q100 18 184 54" stroke="currentColor" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M10 78 Q100 44 190 78" stroke="currentColor" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M10 102 Q100 70 190 102" stroke="currentColor" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M16 126 Q100 96 184 126" stroke="currentColor" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M28 150 Q100 124 172 150" stroke="currentColor" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path d="M50 174 Q100 154 150 174" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
      NEXUS
    </a>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Тема">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav-signout" id="signOutBtn" onclick="signOut()" style="display:none">Выйти</button>
      <a href="index.html" class="nav-back">← На главную</a>
    </div>
  </div>
</nav>

<main class="wrap" id="mainContent">
  <div class="loading" id="loadingState">Загрузка...</div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">NEXUS</div>
    <span class="footer-copy">© 2025 NEXUS</span>
    <span class="footer-inn">Самозанятый · ИНН 614317719468</span>
  </div>
</footer>

<script>
const SUPA_URL = 'https://omzmapjztfphxoymajmk.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tem1hcGp6dGZwaHhveW1ham1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzUzMjYsImV4cCI6MjA4NzkxMTMyNn0.Qjwo2bG6EuHzIAuArJB72uPNZ8Fb_KkU0-a2_ZhbM68'
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY)

function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'
  document.documentElement.setAttribute('data-theme',t)
  localStorage.setItem('nexus-theme',t)
}

async function signOut() {
  await sb.auth.signOut()
  window.location.href = 'index.html'
}

function copyRefCode(code) {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn')
    const orig = btn.textContent
    btn.textContent = 'Скопировано!'
    setTimeout(() => btn.textContent = orig, 2000)
  })
}

function renderProfile(user, profile) {
  const name = profile?.first_name || user.user_metadata?.first_name || user.email?.split('@')[0] || 'Пользователь'
  const username = profile?.username || user.user_metadata?.username || ''
  const email = profile?.email || user.email || ''
  const refCode = profile?.referral_code || '—'
  const sub = profile?.subscription || 'none'
  const subLabel = sub === 'active' ? '<span class="sub-badge sub-active">Pro</span>' : '<span class="sub-badge sub-free">Free</span>'
  const tgInfo = username ? `@${username}` : (profile?.telegram_id ? `#${profile.telegram_id}` : '—')
  const initial = name.charAt(0).toUpperCase()

  document.getElementById('mainContent').innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar">${initial}</div>
      <div>
        <div class="profile-name">${name}</div>
        <div class="profile-sub">${subLabel} · Личный кабинет NEXUS</div>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Email</div>
        <div class="card-value">${email || '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Telegram</div>
        <div class="card-value">${tgInfo}</div>
      </div>
    </div>

    <div class="ref-card">
      <div class="ref-label">Реферальный код</div>
      <div class="ref-row">
        <div class="ref-code">${refCode}</div>
        <button class="ref-copy" id="copyBtn" onclick="copyRefCode('${refCode}')">Копировать</button>
      </div>
      <div class="ref-hint">Поделись кодом с друзьями — получи бонусы за каждого нового пользователя</div>
    </div>

    <div class="actions">
      <a href="https://t.me/ATNexus_Bot" target="_blank" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Открыть бот
      </a>
      <button class="btn-secondary" onclick="signOut()">Выйти из аккаунта</button>
    </div>
  `
}

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) {
    window.location.href = 'index.html'
    return
  }

  document.getElementById('signOutBtn').style.display = ''

  // Загрузить профиль из users таблицы
  const { data: profile } = await sb.from('users').select('*').eq('auth_id', session.user.id).single()
  renderProfile(session.user, profile)
}

init()
</script>
</body>
</html>
